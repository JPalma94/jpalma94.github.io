    	// remove URLS de mensagens enviadas PELO BOT
		function removeURLS(original) {

			var urlsStart = [];
			var urlsEnd = [];

			var auxS = 0;
			var auxE = 0;

			var foundURL = false;

			for(var i = 0; i < original.length; i++) {
    			if(original[i] == '(' && 
    				original[i+1] == 'h' && 
    				original[i+2] == 't' && 
    				original[i+3] == 't' &&
    				original[i+4] == 'p') {

    				foundURL = true;
    				urlsStart[auxS] = i;
    				auxS++;
    			}
    			if(foundURL && original[i] == ')') {
    				urlsEnd[auxE] = i;
    				auxE++;
    			}
    		}

    		if(foundURL == false) {
    			return original;
    		}

    		var urls = []; // vetor com todos os urls da mensagem
    		for(var j = 0; j < urlsStart.length; j++) {
    			urls[j] = original.substring(urlsStart[j], urlsEnd[j] +1);
    		}

    		return original.replace(urls[0], ".").
    		replace(urls[1], ".").
    		replace(urls[2], ".").
    		replace(urls[3], ".").
    		replace(urls[4], ".").
    		replace(urls[5], ".");
 		}
