<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Chatbot de Apoio ao Cliente NOS</title>
	<style>
	html, body { height: 100% }
	body { 
		margin: 0; 
		background-color: white;
	}

	#webchat {
		height: 100%;
		width: 100%;
	}
</style>

<body>
	<div id="webchat" role="main"></div>
	<script src="https://cdn.botframework.com/botframework-webchat/latest/webchat.js"></script> 
	<!-- <script src="https://github.com/JPalma94/jpalma94.github.io/blob/master/webchat.js"></script> -->
	<script>
		const styleOptions = {
			bubbleBackground: '#f7f4f4',
			bubbleFromUserBackground: 'white',

			bubbleBorderRadius: 10,
			bubbleBorder: 'solid 0.5px #000000',

			bubbleFromUserBorderRadius: 10,
			bubbleFromUserBorder: 'solid 0.5px #000000',

	        rootHeight: '100%', // 50%
	        rootWidth: '100%',

	        // userAvatarInitials: 'YOU',
	        // botAvatarInitials: 'NOS',

	        //avatarSize: 50,
	        botAvatarImage: 'https://raw.githubusercontent.com/JPalma94/jpalma94.github.io/master/nos1.png',
	        userAvatarImage: 'https://raw.githubusercontent.com/JPalma94/jpalma94.github.io/master/user12.png',

	        hideUploadButton: true,

	        microphoneButtonColorOnDictate: 'red'
    	};


    (async function () {

		// https://github.com/microsoft/BotFramework-WebChat/blob/master/samples/11.customization-redux-actions/index.html
    	const store = window.WebChat.createStore(
    		{},
    		({ dispatch }) => next => action => {
            if (action.type === 'DIRECT_LINE/CONNECT_FULFILLED') {
              // After connected, we will send a message by dispatching a Redux action.
              // dispatch({ type: 'WEB_CHAT/SEND_MESSAGE', payload: { text: 'sample:backchannel' } });
            } else if (action.type === 'DIRECT_LINE/INCOMING_ACTIVITY') {
              // When receiving an activity of type "event" with name of "sample:backchannel", prompt it out.
              const { activity } = action.payload;
              
              //console.log(window.speechSynthesis);
              //console.log(new SpeechSynthesisUtterance);
              //console.log(window.webkitSpeechRecognition);

              if (activity.type === 'message') {
                // alert(JSON.stringify(activity, null, 2));

                var synth = window.speechSynthesis;
                var voices = synth.getVoices();

                console.log(activity);
                console.log(activity.from);
                console.log(activity.from.id);



                // https://stackoverflow.com/questions/36485170/speechsynthesis-not-working-to-speak-in-portuguese-pt-br

                var utterThis =  new SpeechSynthesisUtterance(activity.text);
               

                synth.speak(utterThis); 

                
              }
            }
            return next(action);
          }
    	);


    	window.WebChat.renderWebChat({
          // caso o token nao de, ir a (azure web app bot -> channels -> configure direct line) buscar
          directLine: window.WebChat.createDirectLine({ token: 'ASr7rpWWuOM.zGP5-hPcd482Lb1ArV8byWz3G0S7GK1voDzDJSQ7XBU' }),
          // https://w3c.github.io/speech-api/ - Web Speech API

          // a tentar por speechrecognition.continuous = true para ver se resolve a cena de continuar sempre a pedir para falar

          //webSpeechPonyfillFactory: window.WebChat.createBrowserWebSpeechPonyfillFactory(),
          userID: 'YOUR_USER_ID',
          username: 'Cliente',
          locale: 'pt-PT',
          styleOptions,
          store
      }, document.getElementById('webchat'));


    	document.querySelector('#webchat > *').focus();

    })().catch(err => console.error(err));
